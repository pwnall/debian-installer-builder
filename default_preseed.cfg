#_preseed_V1

# --- Localization & Timezone ---
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i time/zone string UTC
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

# --- Network Configuration ---
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string TODO_HOST
d-i netcfg/get_domain string local
d-i hw-detect/load_firmware boolean true

# --- Mirror Settings ---
d-i apt-setup/use_mirror boolean false
d-i mirror/country string manual
d-i mirror/http/hostname string
d-i mirror/http/directory string
d-i mirror/http/proxy string

# --- Account Setup ---
# Root login is disabled (Sudo User Only)
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Primary User

# Sensitive values that need to be updated.
d-i passwd/username string TODO_USERNAME
d-i passwd/user-password password TODO_PASSWORD
d-i passwd/user-password-again password TODO_PASSWORD

d-i user-setup/allow-password-weak boolean true
d-i passwd/user-default-groups string audio cdrom video sudo plugdev users netdev

# --- Partitioning (Standard/Guided - Erase Entire Disk) ---
# Dynamically select the first non-USB drive (internal SSD/HDD)
d-i partman/early_command string \
    USBDEV=$(mount | grep /cdrom | cut -d" " -f1 | sed 's/\(.*\)./\1/'); \
    BOOTDEV=$(list-devices disk | grep -v "$USBDEV" | head -n1); \
    debconf-set partman-auto/disk "$BOOTDEV"; \
    debconf-set grub-installer/bootdev "$BOOTDEV"

d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# --- Package Selection ---
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server build-essential curl wget sudo avahi-daemon libnss-mdns
d-i popularity-contest/participate boolean false

# --- Bootloader ---
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

# --- Late Commands ---
# 1. Disable suspend on lid close so the laptop functions as a headless server.
# 2. Inject official Debian network APT mirrors since we skipped them during the offline install.
d-i preseed/late_command string \
    in-target sed -i 's/.*HandleLidSwitch=.*/HandleLidSwitch=ignore/' /etc/systemd/logind.conf ; \
    in-target sed -i 's/.*HandleLidSwitchExternalPower=.*/HandleLidSwitchExternalPower=ignore/' /etc/systemd/logind.conf ; \
    in-target rm -f /etc/apt/sources.list ; \
    in-target sh -c 'C=$(grep VERSION_CODENAME /etc/os-release | cut -d= -f2); echo "Types: deb" > /etc/apt/sources.list.d/debian.sources; echo "URIs: http://deb.debian.org/debian" >> /etc/apt/sources.list.d/debian.sources; echo "Suites: $C $C-updates" >> /etc/apt/sources.list.d/debian.sources; echo "Components: main contrib non-free non-free-firmware" >> /etc/apt/sources.list.d/debian.sources; echo "Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg" >> /etc/apt/sources.list.d/debian.sources; echo "" >> /etc/apt/sources.list.d/debian.sources; echo "Types: deb" >> /etc/apt/sources.list.d/debian.sources; echo "URIs: http://security.debian.org/debian-security" >> /etc/apt/sources.list.d/debian.sources; echo "Suites: $C-security" >> /etc/apt/sources.list.d/debian.sources; echo "Components: main contrib non-free non-free-firmware" >> /etc/apt/sources.list.d/debian.sources; echo "Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg" >> /etc/apt/sources.list.d/debian.sources'
# --- Finish Installation ---
d-i finish-install/reboot_in_progress note
